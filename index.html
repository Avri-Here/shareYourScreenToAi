<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://generativelanguage.googleapis.com wss://generativelanguage.googleapis.com https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: blob: file: https:; media-src 'self' file: blob:;">
    <title>Gemini Live — Screen share</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #080a0d;
            --bg-panel: #0f1218;
            --bg-elevated: #161b24;
            --border: rgba(232, 168, 56, 0.22);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text: #e8eaef;
            --text-muted: #8b92a4;
            --accent: #e8a838;
            --accent-dim: rgba(232, 168, 56, 0.15);
            --teal: #2dd4bf;
            --teal-dim: rgba(45, 212, 191, 0.12);
            --danger: #f87171;
            --success: #4ade80;
            --warn: #fbbf24;
            --font-display: 'Syne', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --radius-sm: 4px;
            --radius-md: 8px;
            --shadow-glow: 0 0 40px rgba(232, 168, 56, 0.08);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.45;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 120% 80% at 100% -20%, rgba(232, 168, 56, 0.12), transparent 50%),
                radial-gradient(ellipse 90% 60% at -10% 100%, rgba(45, 212, 191, 0.08), transparent 45%);
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            max-width: 920px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border-subtle);
            border-right: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-glow), 0 24px 80px rgba(0, 0, 0, 0.55);
            animation: appIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes appIn {
            from {
                opacity: 0;
                transform: translateY(12px) skewY(-0.4deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) skewY(0);
            }
        }

        .topbar {
            flex-shrink: 0;
            position: relative;
            padding: 14px 20px 16px;
            background: linear-gradient(165deg, #141820 0%, #0c0f14 48%, #0a0c10 100%);
            border-bottom: 1px solid var(--border);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 8px), calc(100% - 24px) 100%, 0 100%);
        }

        .topbar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--teal), transparent);
            opacity: 0.85;
        }

        .topbar h1 {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 12px;
            color: var(--text);
            text-transform: uppercase;
        }

        .topbar h1 span {
            color: var(--accent);
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .tab {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-subtle);
            padding: 7px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.15s;
        }

        .tab:hover {
            color: var(--text);
            border-color: rgba(232, 168, 56, 0.35);
            background: var(--accent-dim);
        }

        .tab.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(232, 168, 56, 0.12);
        }

        .main {
            flex: 1;
            min-height: 0;
            padding: 16px 20px 18px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(15, 18, 24, 0.6) 0%, var(--bg-panel) 32%);
        }

        .page {
            display: none;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            gap: 12px;
            animation: pageFade 0.45s ease forwards;
        }

        .page.active {
            display: flex;
        }

        @keyframes pageFade {
            from {
                opacity: 0;
                transform: translateX(-6px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .field label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .field input[type="password"],
        .field input[type="text"],
        .field select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-family: var(--font-body);
            background: var(--bg-elevated);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field select {
            cursor: pointer;
        }

        .field input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(232, 168, 56, 0.25);
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: linear-gradient(145deg, #c9922e 0%, var(--accent) 45%, #d4a043 100%);
            color: #0a0b0e;
            border: none;
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: filter 0.2s, transform 0.12s, box-shadow 0.2s;
            box-shadow: 0 2px 12px rgba(232, 168, 56, 0.25);
        }

        .btn:hover:not(:disabled) {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            background: var(--bg-elevated);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary {
            background: transparent;
            color: var(--teal);
            border: 1px solid rgba(45, 212, 191, 0.45);
            box-shadow: 0 0 16px rgba(45, 212, 191, 0.08);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--teal-dim);
            filter: none;
        }

        .hint {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.45;
            margin-top: 6px;
            font-family: var(--font-mono);
        }

        .share-mode {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
        }

        .share-mode label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
        }

        .share-mode input[type="radio"] {
            accent-color: var(--accent);
            width: 15px;
            height: 15px;
        }

        .status {
            padding: 10px 12px;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 500;
            flex-shrink: 0;
            font-family: var(--font-mono);
            border: 1px solid transparent;
        }

        .status.info {
            background: rgba(45, 212, 191, 0.08);
            color: var(--teal);
            border-color: rgba(45, 212, 191, 0.25);
        }

        .status.success {
            background: rgba(74, 222, 128, 0.1);
            color: var(--success);
            border-color: rgba(74, 222, 128, 0.28);
        }

        .status.error {
            background: rgba(248, 113, 113, 0.1);
            color: var(--danger);
            border-color: rgba(248, 113, 113, 0.3);
        }

        .status.processing {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: rgba(232, 168, 56, 0.35);
        }

        .session-toolbar {
            flex-shrink: 0;
        }

        #liveScreenPreview {
            width: 100%;
            height: 168px;
            object-fit: contain;
            background: #000;
            border-radius: var(--radius-md);
            flex-shrink: 0;
            border: 1px solid var(--border);
            box-shadow: 0 0 32px rgba(232, 168, 56, 0.06), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        #liveScreenPreview.hidden {
            display: none !important;
        }

        #liveTranscript {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            background: var(--bg-deep);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            font-size: 12px;
            scrollbar-color: var(--accent) var(--bg-elevated);
            scrollbar-width: thin;
        }

        #liveTranscript::-webkit-scrollbar {
            width: 8px;
        }

        #liveTranscript::-webkit-scrollbar-track {
            background: var(--bg-elevated);
            border-radius: 4px;
        }

        #liveTranscript::-webkit-scrollbar-thumb {
            background: rgba(232, 168, 56, 0.35);
            border-radius: 4px;
        }

        .timestamp-item {
            background: var(--bg-elevated);
            padding: 8px 10px 10px;
            margin: 8px 0;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            border-left-width: 3px;
            animation: bubbleIn 0.35s ease forwards;
        }

        @keyframes bubbleIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timestamp-item.from-user {
            border-left-color: var(--accent);
        }

        .timestamp-item.from-model {
            border-left-color: var(--teal);
        }

        .timestamp-item .time {
            font-family: var(--font-mono);
            font-weight: 500;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-right: 8px;
        }

        .timestamp-item.from-user .time {
            color: var(--accent);
        }

        .timestamp-item.from-model .time {
            color: var(--teal);
        }

        .timestamp-item .content {
            color: var(--text);
            margin-top: 6px;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.5;
        }

        .session-footer {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .session-footer .field {
            flex: 1;
            margin: 0;
        }

        .session-footer .btn {
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="topbar">
            <h1><span>Gemini Live</span> — Agent screen share</h1>
            <nav class="tabs" role="tablist">
                <button type="button" class="tab active" data-tab="setup" role="tab" aria-selected="true">Setup</button>
                <button type="button" class="tab" data-tab="session" role="tab" aria-selected="false">Session</button>
            </nav>
        </header>

        <main class="main">
            <section id="page-setup" class="page active" role="tabpanel">
                <div class="field">
                    <label for="apiKey">Gemini API key</label>
                    <input type="password" id="apiKey" placeholder="Paste your API key" autocomplete="off">
                    <p class="hint">Stored locally. For production, use ephemeral tokens instead of a client-side key.</p>
                </div>
                <div class="btn-row">
                    <button type="button" class="btn btn-secondary" onclick="saveApiKey()">Save key</button>
                </div>
                <div id="setupStatusMsg" class="status info" style="display: none;"></div>

                <div class="field" style="margin-top: 8px;">
                    <label for="liveModel">Live model</label>
                    <select id="liveModel">
                        <option value="gemini-2.5-flash-native-audio-preview-12-2025" selected>Gemini 2.5 Flash native audio (Live)</option>
                    </select>
                </div>

                <div class="field">
                    <label>When you start a live session</label>
                    <div class="share-mode">
                        <label>
                            <input type="radio" name="liveShareMode" value="voice" checked>
                            Voice only (no screen)
                        </label>
                        <label>
                            <input type="radio" name="liveShareMode" value="screen">
                            Voice + screen share
                        </label>
                    </div>
                    <p class="hint">You can change this before each session. Screen mode opens the system picker after connect.</p>
                </div>
            </section>

            <section id="page-session" class="page" role="tabpanel">
                <div class="session-toolbar btn-row">
                    <button type="button" class="btn" id="liveStartBtn" onclick="startLiveSession()">Start live session</button>
                    <button type="button" class="btn btn-secondary" id="liveStopBtn" onclick="stopLiveSession()" disabled>Stop</button>
                </div>
                <div id="liveStatusMsg" class="status info">Live session idle</div>
                <video id="liveScreenPreview" class="hidden" playsinline autoplay muted></video>
                <div id="liveTranscript"></div>
                <div class="session-footer">
                    <div class="field">
                        <label for="liveTextInput">Message to model (optional)</label>
                        <input type="text" id="liveTextInput" placeholder="Type and send while connected">
                    </div>
                    <button type="button" class="btn btn-secondary" onclick="sendLiveTextMessage()">Send</button>
                </div>
            </section>
        </main>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
