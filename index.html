<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://generativelanguage.googleapis.com wss://generativelanguage.googleapis.com; img-src 'self' data: blob: file: https:; media-src 'self' file: blob:;">
    <title>Gemini Live — Screen share</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #5cdd8b;
            --primary-hover: #7ce8a4;
            --primary-text: #020b05;
            --danger: #dc3545;
            --warning: #f8a306;
            --maintenance: #1747f5;
            --dark-bg: #0d1117;
            --dark-bg2: #070a10;
            --dark-page: #090c10;
            --dark-header: #161b22;
            --dark-border: #1d2634;
            --dark-font: #b1b8c0;
            --ease-in: cubic-bezier(0.54, 0.78, 0.55, 0.97);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family:
                BlinkMacSystemFont,
                'Segoe UI',
                Roboto,
                'Helvetica Neue',
                Arial,
                sans-serif;
            background: var(--dark-page);
            color: var(--dark-font);
        }

        .app {
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--dark-header);
            border-right: 1px solid var(--dark-border);
            padding: 20px 14px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 0 3px rgba(92, 221, 139, 0.25);
            flex-shrink: 0;
        }

        .sidebar-brand h1 {
            font-size: 17px;
            font-weight: 700;
            color: #e6edf3;
            line-height: 1.25;
        }

        .sidebar-brand h1 span {
            color: var(--primary);
        }

        .sidebar-brand .sub {
            font-size: 11px;
            font-weight: 500;
            color: var(--dark-font);
            margin-top: 2px;
        }

        .tabs {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tab {
            width: 100%;
            text-align: left;
            border: none;
            padding: 11px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-font);
            background: transparent;
            transition: background 0.15s var(--ease-in), color 0.15s var(--ease-in);
        }

        .tab:hover {
            background: rgba(92, 221, 139, 0.12);
            color: #e6edf3;
        }

        .tab.active {
            background: var(--primary);
            color: var(--primary-text);
        }

        .content-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: var(--dark-page);
        }

        .main {
            flex: 1;
            min-height: 0;
            padding: 16px 20px 18px;
            overflow: hidden;
        }

        .shadow-box {
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: var(--dark-bg);
            border-radius: 10px;
            box-shadow: 0 15px 70px rgb(0 0 0);
            padding: 20px;
            overflow: hidden;
        }

        .page {
            display: none;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            gap: 12px;
        }

        .page.active {
            display: flex;
            animation: slideFade 0.2s var(--ease-in) forwards;
        }

        @keyframes slideFade {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
            color: var(--dark-font);
        }

        .field input[type="password"],
        .field input[type="text"],
        .field select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--dark-font);
            background: var(--dark-bg2);
            transition: border-color 0.15s var(--ease-in), box-shadow 0.15s var(--ease-in);
        }

        .field select {
            cursor: pointer;
        }

        .field input::placeholder {
            color: rgba(177, 184, 192, 0.55);
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(92, 221, 139, 0.2);
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .btn {
            border: none;
            padding: 9px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            background: var(--primary);
            color: var(--primary-text);
            transition: background 0.15s var(--ease-in), color 0.15s var(--ease-in), opacity 0.15s;
        }

        .btn:hover:not(:disabled) {
            background: var(--primary-hover);
            color: var(--primary-text);
        }

        .btn:disabled {
            background: var(--dark-header);
            color: rgba(177, 184, 192, 0.45);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--dark-header);
            color: var(--dark-font);
            border: 1px solid var(--dark-border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #1f2630;
            color: #e6edf3;
        }

        .hint {
            font-size: 12px;
            color: rgba(177, 184, 192, 0.85);
            line-height: 1.45;
            margin-top: 6px;
        }

        .share-mode {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
        }

        .share-mode label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            font-size: 14px;
            color: var(--dark-font);
            cursor: pointer;
        }

        .share-mode input[type="radio"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        .status {
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
            border: 1px solid transparent;
        }

        .status.info {
            background: rgba(23, 71, 245, 0.15);
            color: #8baaf8;
            border-color: rgba(23, 71, 245, 0.35);
        }

        .status.success {
            background: rgba(92, 221, 139, 0.18);
            color: var(--primary);
            border-color: rgba(92, 221, 139, 0.35);
        }

        .status.error {
            background: rgba(220, 53, 69, 0.15);
            color: #f1aeb5;
            border-color: rgba(220, 53, 69, 0.35);
        }

        .status.processing {
            background: rgba(248, 163, 6, 0.15);
            color: #f8d88a;
            border-color: rgba(248, 163, 6, 0.35);
        }

        .session-toolbar {
            flex-shrink: 0;
        }

        #liveScreenPreview {
            width: 100%;
            height: 168px;
            object-fit: contain;
            background: #000;
            border-radius: 10px;
            flex-shrink: 0;
            border: 1px solid var(--dark-border);
        }

        #liveScreenPreview.hidden {
            display: none !important;
        }

        #liveTranscript {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            background: var(--dark-bg2);
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            scrollbar-width: thin;
            scrollbar-color: var(--dark-border) var(--dark-bg2);
        }

        #liveTranscript::-webkit-scrollbar {
            width: 10px;
        }

        #liveTranscript::-webkit-scrollbar-thumb {
            background: var(--dark-border);
            border-radius: 20px;
        }

        .timestamp-item {
            background: var(--dark-bg);
            padding: 10px 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--dark-border);
            border-left: 4px solid var(--dark-border);
            transition: background 0.15s var(--ease-in);
        }

        .timestamp-item.from-user {
            border-left-color: var(--primary);
        }

        .timestamp-item.from-model {
            border-left-color: var(--maintenance);
        }

        .timestamp-item .time {
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-right: 8px;
        }

        .timestamp-item.from-user .time {
            color: var(--primary);
        }

        .timestamp-item.from-model .time {
            color: #8baaf8;
        }

        .timestamp-item .content {
            color: #e6edf3;
            margin-top: 6px;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.5;
        }

        .session-footer {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .session-footer .field {
            flex: 1;
            margin: 0;
        }

        .session-footer .btn {
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-brand-dot" aria-hidden="true"></span>
                <div>
                    <h1><span>Gemini</span> Live</h1>
                    <p class="sub">Agent screen share</p>
                </div>
            </div>
            <nav class="tabs" role="tablist">
                <button type="button" class="tab active" data-tab="setup" role="tab" aria-selected="true">Setup</button>
                <button type="button" class="tab" data-tab="session" role="tab" aria-selected="false">Session</button>
            </nav>
        </aside>

        <div class="content-wrap">
            <main class="main">
                <div class="shadow-box">
            <section id="page-setup" class="page active" role="tabpanel">
                <div class="field">
                    <label for="apiKey">Gemini API key</label>
                    <input type="password" id="apiKey" placeholder="Paste your API key" autocomplete="off">
                    <p class="hint">Stored locally. For production, use ephemeral tokens instead of a client-side key.</p>
                </div>
                <div class="btn-row">
                    <button type="button" class="btn btn-secondary" onclick="saveApiKey()">Save key</button>
                </div>
                <div id="setupStatusMsg" class="status info" style="display: none;"></div>

                <div class="field" style="margin-top: 8px;">
                    <label for="liveModel">Live model</label>
                    <select id="liveModel">
                        <option value="gemini-2.5-flash-native-audio-preview-12-2025" selected>Gemini 2.5 Flash native audio (Live)</option>
                    </select>
                </div>

                <div class="field">
                    <label>When you start a live session</label>
                    <div class="share-mode">
                        <label>
                            <input type="radio" name="liveShareMode" value="voice" checked>
                            Voice only (no screen)
                        </label>
                        <label>
                            <input type="radio" name="liveShareMode" value="screen">
                            Voice + screen share
                        </label>
                    </div>
                    <p class="hint">You can change this before each session. Screen mode opens the system picker after connect.</p>
                </div>
            </section>

            <section id="page-session" class="page" role="tabpanel">
                <div class="session-toolbar btn-row">
                    <button type="button" class="btn" id="liveStartBtn" onclick="startLiveSession()">Start live session</button>
                    <button type="button" class="btn btn-secondary" id="liveStopBtn" onclick="stopLiveSession()" disabled>Stop</button>
                </div>
                <div id="liveStatusMsg" class="status info">Live session idle</div>
                <video id="liveScreenPreview" class="hidden" playsinline autoplay muted></video>
                <div id="liveTranscript"></div>
                <div class="session-footer">
                    <div class="field">
                        <label for="liveTextInput">Message to model (optional)</label>
                        <input type="text" id="liveTextInput" placeholder="Type and send while connected">
                    </div>
                    <button type="button" class="btn btn-secondary" onclick="sendLiveTextMessage()">Send</button>
                </div>
            </section>
                </div>
            </main>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
